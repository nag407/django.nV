name: Django – CI + SCA + SAST + Secrets + DAST + Compliance

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────
  # 1. BUILD
  # ────────────────────────────────
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py check

  # ────────────────────────────────
  # 2. TEST
  # ────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'

      - name: Run Django test suite
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py test taskManager

  # ────────────────────────────────
  # 3. SCA — Snyk + Inline Gate
  # Gate reads snyk JSON directly
  # Blocks if new criticals introduced
  # ────────────────────────────────
  sca-snyk:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk scan
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json \
            > snyk-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ── INLINE GATE ──────────────
      - name: "Gate: SCA threshold check"
        run: |
          python3 << 'EOF'
          import json, sys

          CRITICAL_BASELINE = 6     # known django.nv baseline
          HIGH_BASELINE     = 18    # known django.nv baseline

          with open('snyk-results.json') as f:
              data = json.load(f)

          vulns    = data.get('vulnerabilities', [])
          critical = [v for v in vulns if v.get('severity') == 'critical']
          high     = [v for v in vulns if v.get('severity') == 'high']
          medium   = [v for v in vulns if v.get('severity') == 'medium']
          low      = [v for v in vulns if v.get('severity') == 'low']

          print("=" * 50)
          print("SCA GATE — Snyk Results")
          print("=" * 50)
          print(f"  Critical : {len(critical):3d}  (baseline: {CRITICAL_BASELINE})")
          print(f"  High     : {len(high):3d}  (baseline: {HIGH_BASELINE})")
          print(f"  Medium   : {len(medium):3d}")
          print(f"  Low      : {len(low):3d}")

          failures = []
          warnings = []

          # Block on new criticals above baseline
          if len(critical) > CRITICAL_BASELINE:
              failures.append(
                  f"NEW CRITICAL: {len(critical) - CRITICAL_BASELINE} "
                  f"above baseline of {CRITICAL_BASELINE}"
              )
          elif len(critical) == CRITICAL_BASELINE:
              warnings.append(
                  f"{len(critical)} CRITICAL known — "
                  f"accepted baseline, remediation required"
              )

          # Block on new highs above baseline
          if len(high) > HIGH_BASELINE:
              failures.append(
                  f"NEW HIGH: {len(high) - HIGH_BASELINE} "
                  f"above baseline of {HIGH_BASELINE}"
              )
          elif len(high) == HIGH_BASELINE:
              warnings.append(
                  f"{len(high)} HIGH known — accepted baseline"
              )

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for f in failures:
                  print(f"  ✖  {f}")
              print("\nSCA GATE: FAILED — stopping pipeline")
              sys.exit(1)

          print("\nSCA GATE: PASSED ✓")
          EOF

      - name: Upload Snyk artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: snyk-results
          path: snyk-results.json
          retention-days: 14

  # ────────────────────────────────
  # 4. SAST — Semgrep + Inline Gate
  # Gate reads SARIF directly
  # Blocks on any error-level finding
  # ────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-22.04
    needs: sca-snyk               # only runs if SCA gate passes

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            -q \
            --sarif \
            --config "p/django" \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --output semgrep.sarif \
            .
        continue-on-error: true

      # ── INLINE GATE ──────────────
      - name: "Gate: SAST Semgrep threshold check"
        run: |
          python3 << 'EOF'
          import json, sys

          ERROR_THRESHOLD  = 0    # zero tolerance on high/error
          WARN_THRESHOLD   = 10   # warn if medium exceeds 10

          with open('semgrep.sarif') as f:
              data = json.load(f)

          results = []
          for run in data.get('runs', []):
              results.extend(run.get('results', []))

          error   = [r for r in results if r.get('level') == 'error']
          warning = [r for r in results if r.get('level') == 'warning']
          note    = [r for r in results if r.get('level') == 'note']

          print("=" * 50)
          print("SAST GATE — Semgrep Results")
          print("=" * 50)
          print(f"  Error   (High)   : {len(error):3d}  (threshold: {ERROR_THRESHOLD})")
          print(f"  Warning (Medium) : {len(warning):3d}  (threshold: {WARN_THRESHOLD})")
          print(f"  Note    (Low)    : {len(note):3d}")

          # Print top findings for visibility
          if error:
              print("\n  Top HIGH findings:")
              for r in error[:5]:
                  rule = r.get('ruleId', 'unknown')
                  locs = r.get('locations', [{}])
                  path = locs[0].get('physicalLocation', {}) \
                                .get('artifactLocation', {}) \
                                .get('uri', '?')
                  line = locs[0].get('physicalLocation', {}) \
                                .get('region', {}) \
                                .get('startLine', '?')
                  msg  = r.get('message', {}).get('text', '')[:60]
                  print(f"    [{rule}] {path}:{line} — {msg}")

          failures = []
          warnings = []

          if len(error) > ERROR_THRESHOLD:
              failures.append(
                  f"{len(error)} HIGH/ERROR findings "
                  f"(threshold: {ERROR_THRESHOLD})"
              )

          if len(warning) > WARN_THRESHOLD:
              warnings.append(
                  f"{len(warning)} MEDIUM findings "
                  f"(threshold: {WARN_THRESHOLD})"
              )

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for f in failures:
                  print(f"  ✖  {f}")
              print("\nSAST SEMGREP GATE: FAILED — stopping pipeline")
              sys.exit(1)

          print("\nSAST SEMGREP GATE: PASSED ✓")
          EOF

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 14

  # ────────────────────────────────
  # 5. SAST — CodeQL + Inline Gate
  # Gate reads SARIF directly
  # Blocks on any error-level finding
  # ────────────────────────────────
  sast-codeql:
    runs-on: ubuntu-22.04
    needs: sast-semgrep           # only runs if Semgrep gate passes
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: codeql-sarif
          upload: true

      # ── INLINE GATE ──────────────
      - name: "Gate: SAST CodeQL threshold check"
        run: |
          python3 << 'EOF'
          import json, sys, glob, os

          ERROR_THRESHOLD = 0    # zero tolerance on high/error
          WARN_THRESHOLD  = 5    # warn if medium exceeds 5

          # Find CodeQL SARIF — output dir may vary
          sarif_files = glob.glob('codeql-sarif/**/*.sarif', recursive=True)
          if not sarif_files:
              sarif_files = glob.glob('/home/runner/work/**/*.sarif', recursive=True)

          print("=" * 50)
          print("SAST GATE — CodeQL Results")
          print("=" * 50)

          if not sarif_files:
              print("  WARNING: No CodeQL SARIF found — skipping gate")
              print("\nCODEQL GATE: SKIPPED (no output)")
              sys.exit(0)

          results = []
          for sf in sarif_files:
              with open(sf) as f:
                  data = json.load(f)
              for run in data.get('runs', []):
                  results.extend(run.get('results', []))

          error   = [r for r in results if r.get('level') == 'error']
          warning = [r for r in results if r.get('level') == 'warning']
          note    = [r for r in results if r.get('level') == 'note']

          print(f"  Error   (High)   : {len(error):3d}  (threshold: {ERROR_THRESHOLD})")
          print(f"  Warning (Medium) : {len(warning):3d}  (threshold: {WARN_THRESHOLD})")
          print(f"  Note    (Low)    : {len(note):3d}")

          if error:
              print("\n  Top HIGH findings:")
              for r in error[:5]:
                  rule = r.get('ruleId', 'unknown')
                  locs = r.get('locations', [{}])
                  path = locs[0].get('physicalLocation', {}) \
                                .get('artifactLocation', {}) \
                                .get('uri', '?')
                  line = locs[0].get('physicalLocation', {}) \
                                .get('region', {}) \
                                .get('startLine', '?')
                  print(f"    [{rule}] {path}:{line}")

          failures = []
          warnings = []

          if len(error) > ERROR_THRESHOLD:
              failures.append(
                  f"{len(error)} HIGH/ERROR findings "
                  f"(threshold: {ERROR_THRESHOLD})"
              )
          if len(warning) > WARN_THRESHOLD:
              warnings.append(
                  f"{len(warning)} MEDIUM findings "
                  f"(threshold: {WARN_THRESHOLD})"
              )

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for f in failures:
                  print(f"  ✖  {f}")
              print("\nCODEQL GATE: FAILED — stopping pipeline")
              sys.exit(1)

          print("\nCODEQL GATE: PASSED ✓")
          EOF

      - name: Upload CodeQL artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: codeql-results
          path: codeql-sarif/
          retention-days: 14

  # ────────────────────────────────
  # 6. SECRETS — Gitleaks + Inline Gate
  # Zero tolerance — any secret blocks
  # ────────────────────────────────
  secret-scanning:
    runs-on: ubuntu-22.04
    needs: sast-codeql            # only runs if CodeQL gate passes

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0          # full history scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── INLINE GATE ──────────────
      - name: "Gate: Secrets zero-tolerance check"
        run: |
          python3 << 'EOF'
          import json, sys, os

          print("=" * 50)
          print("SECRETS GATE — Gitleaks Results")
          print("=" * 50)

          sarif_file = 'results.sarif'

          if not os.path.exists(sarif_file):
              print("  No results.sarif found")
              print("  This means either:")
              print("  1. No secrets detected (good)")
              print("  2. Gitleaks failed to run (check above steps)")
              print("\nSECRETS GATE: PASSED ✓ (no findings file = no secrets)")
              sys.exit(0)

          with open(sarif_file) as f:
              data = json.load(f)

          results = []
          for run in data.get('runs', []):
              results.extend(run.get('results', []))

          print(f"  Secrets found: {len(results)}")

          if results:
              print("\n  Secrets detected:")
              for r in results[:5]:
                  rule = r.get('ruleId', 'unknown')
                  locs = r.get('locations', [{}])
                  path = locs[0].get('physicalLocation', {}) \
                                .get('artifactLocation', {}) \
                                .get('uri', '?')
                  line = locs[0].get('physicalLocation', {}) \
                                .get('region', {}) \
                                .get('startLine', '?')
                  print(f"    [{rule}] {path}:{line}")

          if len(results) > 0:
              print(f"\n  ✖  {len(results)} secret(s) found — zero tolerance policy")
              print("\nSECRETS GATE: FAILED — stopping pipeline")
              sys.exit(1)

          print("\nSECRETS GATE: PASSED ✓")
          EOF

      - name: Upload Gitleaks artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 14

  

  # ────────────────────────────────
  # 8. COMPLIANCE — Checkov + Inline Gate
  # Gate reads SARIF directly
  # Blocks on critical misconfigs
  # ────────────────────────────────
  compliance-checkov:
    runs-on: ubuntu-22.04
    needs: secret-scanning               # only runs if DAST gate passes

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov scan
        run: |
          checkov \
            --directory .github/workflows \
            --framework github_actions \
            --output sarif \
            --output-file-path . \
            --soft-fail \
            --compact
        continue-on-error: true

      - name: Verify Checkov output
        if: always()
        run: |
          echo "=== Checkov output files ==="
          find . -maxdepth 2 \( -name "*.sarif" -o -name "results*" \) | sort

      # ── INLINE GATE ──────────────
      - name: "Gate: Compliance threshold check"
        run: |
          python3 << 'EOF'
          import json, sys, os, glob

          CRITICAL_THRESHOLD = 0    # zero tolerance on critical
          HIGH_THRESHOLD     = 5    # warn if high exceeds 5

          print("=" * 50)
          print("COMPLIANCE GATE — Checkov Results")
          print("=" * 50)

          # Checkov can write different filenames
          sarif_file = None
          for candidate in ['results_sarif.sarif', 'results.sarif', 'checkov.sarif']:
              if os.path.exists(candidate):
                  sarif_file = candidate
                  break

          if not sarif_file:
              found = glob.glob('**/*.sarif', recursive=True)
              if found:
                  sarif_file = found[0]

          print(f"  File: {sarif_file or 'NOT FOUND'}")

          if not sarif_file:
              print("  WARNING: No Checkov SARIF found")
              print("  Checkov may have found nothing to scan")
              print("\nCOMPLIANCE GATE: PASSED ✓ (no output = nothing to flag)")
              sys.exit(0)

          with open(sarif_file) as f:
              data = json.load(f)

          results = []
          for run in data.get('runs', []):
              results.extend(run.get('results', []))

          critical = [r for r in results if r.get('level') == 'error']
          high     = [r for r in results if r.get('level') == 'warning']
          low      = [r for r in results if r.get('level') == 'note']

          print(f"  Critical/Error  : {len(critical):3d}  (threshold: {CRITICAL_THRESHOLD})")
          print(f"  High/Warning    : {len(high):3d}  (threshold: {HIGH_THRESHOLD})")
          print(f"  Low/Note        : {len(low):3d}")

          if critical:
              print("\n  CRITICAL findings:")
              for r in critical[:5]:
                  rule = r.get('ruleId', 'unknown')
                  msg  = r.get('message', {}).get('text', '')[:60]
                  print(f"    ✖  [{rule}] {msg}")

          failures = []
          warnings = []

          if len(critical) > CRITICAL_THRESHOLD:
              failures.append(
                  f"{len(critical)} CRITICAL misconfigurations "
                  f"(threshold: {CRITICAL_THRESHOLD})"
              )
          if len(high) > HIGH_THRESHOLD:
              warnings.append(
                  f"{len(high)} HIGH misconfigurations "
                  f"(threshold: {HIGH_THRESHOLD})"
              )

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for f in failures:
                  print(f"  ✖  {f}")
              print("\nCOMPLIANCE GATE: FAILED — stopping pipeline")
              sys.exit(1)

          print("\nCOMPLIANCE GATE: PASSED ✓")
          EOF

      - name: Upload Checkov artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: checkov-results
          path: |
            results_sarif.sarif
            results.sarif
          if-no-files-found: warn
          retention-days: 14

  # ────────────────────────────────
  # 9. INTEGRATION
  # Only reaches here if ALL gates pass
  # ────────────────────────────────
  integration:
    runs-on: ubuntu-22.04
    needs: compliance-checkov
    steps:
      - name: Integration smoke test
        run: |
          echo "All security gates passed"
          echo "Safe to proceed to integration"

  # ────────────────────────────────
  # 10. PROD
  # ────────────────────────────────
  prod:
    runs-on: ubuntu-22.04
    needs: integration
    steps:
      - name: Deploy to production
        run: echo "Deploy step — replace with actual deploy command"