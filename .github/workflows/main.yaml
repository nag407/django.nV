name: Django – CI + SCA (Snyk) + SAST + Secrets + Compliance

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Least-privilege token permissions
permissions:
  contents: read

# Cancel duplicate runs on the same branch/PR
concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ────────────────────────────────
  # 1. BUILD
  # ────────────────────────────────
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies and verify Django config
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py check

  # ────────────────────────────────
  # 2. TEST
  # ────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Run Django test suite
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py test taskManager

  # ────────────────────────────────────────────────────────────────────────────
  # 3. SCA — Snyk  (EPSS-enriched gate)
  # ────────────────────────────────────────────────────────────────────────────
  # Gate axes:
  #
  #   AXIS 1 — EPSS (primary, via FIRST.org API)
  #     BLOCK : any CVE with EPSS score >= 0.3  AND severity critical/high
  #     WARN  : any CVE with EPSS score >= 0.1
  #
  #   AXIS 2 — Raw count fallback
  #     (catches non-NVD advisories that carry no CVE ID → no EPSS score)
  #     BLOCK : critical > 6  OR  high > 18   (current baseline)
  #
  # Outputs:
  #   snyk.sarif             → GitHub Security tab
  #   snyk-results.json      → raw Snyk JSON artifact (unchanged, kept for
  #                            backwards compat with any downstream tooling)
  #   snyk_epss_report.json  → enriched report: every CVE + its EPSS score
  #                            + final gate decision; uploaded as artifact
  # ────────────────────────────────────────────────────────────────────────────
  oast-snyk:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      # ── Run Snyk — emit both JSON and SARIF ──────────────────────────────
      # We need JSON for the raw artifact and SARIF for the EPSS gate script.
      # '|| true' on both — Snyk exits 1 when vulns are found; the gate decides.
      - name: Run Snyk SCA scan (JSON output)
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json \
            > snyk-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk SCA scan (SARIF output)
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ── Upload SARIF to GitHub Security tab ──────────────────────────────
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk-sca

      # ── EPSS-enriched gate ────────────────────────────────────────────────
      # Calls FIRST.org EPSS API, scores every CVE found by Snyk,
      # and blocks/warns based on exploit probability rather than raw counts.
      # Falls back to raw counts for advisories with no CVE ID.
      - name: Run EPSS-enriched Snyk gate
        env:
          EPSS_BLOCK_THRESHOLD: "0.3"   # block if any critical/high CVE has EPSS >= 30%
          EPSS_WARN_THRESHOLD:  "0.1"   # warn  if any CVE has EPSS >= 10%
          RAW_CRIT_CEILING:     "6"     # fallback: baseline from django.nV
          RAW_HIGH_CEILING:     "18"    # fallback: baseline from django.nV
          WARN_IS_BLOCK:        "false" # set true to make WARN a hard failure
          SARIF_FILE:           "snyk.sarif"
        run: python3 .github/scripts/snyk_epss_gate.py

      # ── Upload both artifacts ─────────────────────────────────────────────
      - name: Upload raw Snyk JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: snyk-results.json
          retention-days: 14

      - name: Upload EPSS enrichment report
        uses: actions/upload-artifact@v4
        if: always()   # upload even on gate block so scores are inspectable
        with:
          name: snyk-epss-report
          path: snyk_epss_report.json
          retention-days: 30

  # ────────────────────────────────
  # 4a. SAST — Semgrep
  # ────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-22.04
    needs: test
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Perform Semgrep Analysis
        run: |
          semgrep scan -q --sarif \
            --config "p/django" \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --output semgrep.sarif .
        continue-on-error: true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 14

  # ────────────────────────────────
  # 4b. SAST — CodeQL
  # ────────────────────────────────
  sast-codeql:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql
          output: codeql.sarif

      - name: Upload CodeQL artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-results
          path: codeql.sarif
          retention-days: 14

  # ────────────────────────────────
  # 5. SECRET SCANNING — Gitleaks
  # ────────────────────────────────
  secret-scanning:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif
          retention-days: 14

  # ────────────────────────────────
  # 6. COMPLIANCE — Checkov
  # ────────────────────────────────
  compliance-checkov:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run Checkov compliance scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true
        continue-on-error: true

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Upload Checkov artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov.sarif
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # 7. QUALITY GATE
  # ────────────────────────────────────────────────────────────────────────────
  # NOTE: Snyk is NO LONGER evaluated here.
  # The oast-snyk job now runs its own inline EPSS gate and fails itself if
  # the threshold is breached. This job sees oast-snyk as a required
  # predecessor via 'needs' — if oast-snyk fails, this job never runs,
  # which already blocks the merge via branch protection.
  #
  # This job evaluates: Semgrep · CodeQL · Gitleaks · Checkov
  # ────────────────────────────────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-22.04
    needs: [oast-snyk, sast-semgrep, sast-codeql, secret-scanning, compliance-checkov]
    if: always()

    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scan-results

      - name: Evaluate quality gates
        run: |
          python3 << 'EOF'
          import json, os, sys

          RESULTS_DIR = "scan-results"
          failures = []
          warnings = []

          print("=" * 60)
          print("QUALITY GATE EVALUATION")
          print("=" * 60)

          # ──────────────────────────────────────────────────────
          # NOTE: Snyk gate is handled by oast-snyk job via EPSS.
          # We print the EPSS summary here for the pipeline log
          # but do NOT re-gate on it (avoids double-counting).
          # ──────────────────────────────────────────────────────
          epss_file = f"{RESULTS_DIR}/snyk-epss-report/snyk_epss_report.json"
          if os.path.exists(epss_file):
              with open(epss_file) as f:
                  epss_report = json.load(f)
              gate    = epss_report.get("gate", "UNKNOWN")
              reason  = epss_report.get("reason", "")
              scores  = epss_report.get("epss_scores", {})
              print(f"\n[SCA - Snyk + EPSS]  (evaluated inline by oast-snyk job)")
              print(f"  Gate decision : {gate}")
              print(f"  Reason        : {reason}")
              if scores:
                  print(f"  CVEs scored   : {len(scores)}")
                  for cve, d in sorted(scores.items(),
                                       key=lambda x: x[1].get('epss', 0),
                                       reverse=True)[:5]:
                      pct = d.get('percentile', 0) * 100
                      print(f"    {cve}  EPSS={d.get('epss',0):.4f}  ({pct:.1f}th pct)")
          else:
              warnings.append("SCA: snyk_epss_report.json not found — oast-snyk may have failed before producing it")

          # ──────────────────────────────
          # GATE 1: Semgrep SAST
          # Block  : error   > 0
          # Warn   : warning > 10
          # ──────────────────────────────
          semgrep_file = f"{RESULTS_DIR}/semgrep-results/semgrep.sarif"
          if os.path.exists(semgrep_file):
              with open(semgrep_file) as f:
                  sarif = json.load(f)

              rule_defaults = {}
              results = []
              for run in sarif.get("runs", []):
                  # Build rule-level lookup (severity lives on rule, not result)
                  for rule in run["tool"]["driver"].get("rules", []):
                      rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  for ext in run["tool"].get("extensions", []):
                      for rule in ext.get("rules", []):
                          rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  results.extend(run.get("results", []))

              def resolve_level(r):
                  rid = r.get("ruleId", "")
                  return (r.get("level") or rule_defaults.get(rid, "warning")).lower()

              errors   = [r for r in results if resolve_level(r) == "error"]
              warnings_ = [r for r in results if resolve_level(r) == "warning"]
              notes    = [r for r in results if resolve_level(r) == "note"]

              print(f"\n[SAST - Semgrep]")
              print(f"  Error   : {len(errors)}")
              print(f"  Warning : {len(warnings_)}")
              print(f"  Note    : {len(notes)}")

              if len(errors) > 0:
                  failures.append(f"SAST Semgrep: {len(errors)} error-level finding(s) (threshold: 0)")
              if len(warnings_) > 10:
                  warnings.append(f"SAST Semgrep: {len(warnings_)} warning-level findings (threshold: 10, currently {len(warnings_)})")
          else:
              warnings.append("SAST: semgrep.sarif not found — scan may have failed")

          # ──────────────────────────────
          # GATE 2: CodeQL SAST
          # Block  : error   > 0
          # Warn   : warning > 5
          # ──────────────────────────────
          codeql_file = f"{RESULTS_DIR}/codeql-results/codeql.sarif"
          if os.path.exists(codeql_file):
              with open(codeql_file) as f:
                  sarif = json.load(f)

              rule_defaults = {}
              results = []
              for run in sarif.get("runs", []):
                  # CodeQL stores rules in extensions[], not driver.rules
                  for rule in run["tool"]["driver"].get("rules", []):
                      rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  for ext in run["tool"].get("extensions", []):
                      for rule in ext.get("rules", []):
                          rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  results.extend(run.get("results", []))

              def resolve_codeql_level(r):
                  rid = r.get("ruleId", "")
                  return (r.get("level") or rule_defaults.get(rid, "warning")).lower()

              cq_errors   = [r for r in results if resolve_codeql_level(r) == "error"]
              cq_warnings = [r for r in results if resolve_codeql_level(r) == "warning"]
              cq_notes    = [r for r in results if resolve_codeql_level(r) == "note"]

              print(f"\n[SAST - CodeQL]")
              print(f"  Error   : {len(cq_errors)}")
              print(f"  Warning : {len(cq_warnings)}")
              print(f"  Note    : {len(cq_notes)}")

              if len(cq_errors) > 0:
                  failures.append(f"SAST CodeQL: {len(cq_errors)} error-level finding(s) (threshold: 0)")
              if len(cq_warnings) > 5:
                  warnings.append(f"SAST CodeQL: {len(cq_warnings)} warning-level findings (threshold: 5)")
          else:
              warnings.append("SAST CodeQL: codeql.sarif not found — scan may have failed")

          # ──────────────────────────────
          # GATE 3: Gitleaks Secrets
          # Zero tolerance — any secret = block
          # ──────────────────────────────
          secrets_file = f"{RESULTS_DIR}/gitleaks-results/results.sarif"
          if os.path.exists(secrets_file):
              with open(secrets_file) as f:
                  sarif = json.load(f)
              secrets_found = []
              for run in sarif.get("runs", []):
                  secrets_found.extend(run.get("results", []))
              print(f"\n[Secrets - Gitleaks]")
              print(f"  Secrets found: {len(secrets_found)}")
              if len(secrets_found) > 0:
                  failures.append(f"SECRETS: {len(secrets_found)} secret(s) detected — zero tolerance policy")
          else:
              warnings.append("Secrets: results.sarif not found — scan may have failed")

          # ──────────────────────────────
          # GATE 4: Checkov Compliance
          # Block  : critical > 0
          # Warn   : high     > 5
          # ──────────────────────────────
          checkov_file = f"{RESULTS_DIR}/checkov-results/checkov.sarif"
          if os.path.exists(checkov_file):
              with open(checkov_file) as f:
                  sarif = json.load(f)

              rule_defaults = {}
              checkov_results = []
              for run in sarif.get("runs", []):
                  for rule in run["tool"]["driver"].get("rules", []):
                      rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  for ext in run["tool"].get("extensions", []):
                      for rule in ext.get("rules", []):
                          rule_defaults[rule["id"]] = rule.get("defaultConfiguration", {}).get("level", "warning")
                  checkov_results.extend(run.get("results", []))

              def resolve_checkov_level(r):
                  rid = r.get("ruleId", "")
                  return (r.get("level") or rule_defaults.get(rid, "warning")).lower()

              ck_critical = [r for r in checkov_results if resolve_checkov_level(r) == "error"]
              ck_high     = [r for r in checkov_results if resolve_checkov_level(r) == "warning"]

              print(f"\n[Compliance - Checkov]")
              print(f"  Critical/Error : {len(ck_critical)}")
              print(f"  High/Warning   : {len(ck_high)}")

              if len(ck_critical) > 0:
                  failures.append(f"COMPLIANCE: {len(ck_critical)} CRITICAL misconfiguration(s) (threshold: 0)")
              if len(ck_high) > 5:
                  warnings.append(f"COMPLIANCE: {len(ck_high)} HIGH misconfigs (threshold: 5)")
          else:
              warnings.append("Compliance: checkov.sarif not found — scan may have failed")

          # ──────────────────────────────
          # FINAL VERDICT
          # ──────────────────────────────
          print("\n" + "=" * 60)
          print("GATE SUMMARY")
          print("=" * 60)

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for bl in failures:
                  print(f"  ✖  {bl}")
              print("\n" + "=" * 60)
              print("QUALITY GATE: FAILED — merge is blocked")
              print("=" * 60)
              sys.exit(1)
          else:
              print("\n" + "=" * 60)
              print("QUALITY GATE: PASSED — pipeline may proceed")
              print("=" * 60)
              sys.exit(0)
          EOF

  # ────────────────────────────────
  # 8. INTEGRATION (stub)
  # ────────────────────────────────
  integration:
    runs-on: ubuntu-22.04
    needs: quality-gate
    steps:
      - name: Integration smoke test
        run: echo "Integration step — replace with real smoke test"

  # ────────────────────────────────
  # 9. PROD DEPLOY (stub)
  # ────────────────────────────────
  prod:
    runs-on: ubuntu-22.04
    needs: integration
    steps:
      - name: Deploy to production
        run: echo "Deploy step — replace with actual deploy command"
