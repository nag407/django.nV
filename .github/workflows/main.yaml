name: Django – CI + SCA (Snyk)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'            # downgraded for django.nv compatibility

      - name: Install dependencies and verify Django config
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py check

  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'            # downgraded for django.nv compatibility

      - name: Run Django test suite
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py test taskManager

  oast-snyk:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.8'            # downgraded for django.nv compatibility

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk SCA scan
        run: |
          snyk auth $SNYK_TOKEN
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json \
            > snyk-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: snyk-results
          path: snyk-results.json
          retention-days: 14

  integration:
    runs-on: ubuntu-22.04
    needs: oast-snyk
    steps:
      - name: Integration smoke test
        run: echo "Integration step — replace with real smoke test"

  prod:
    runs-on: ubuntu-22.04
    needs: integration
    steps:
      - name: Deploy to production
        run: echo "Deploy step — replace with actual deploy command"
