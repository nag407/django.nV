name: Django – CI + SCA (Snyk)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: 
# Least-privilege token permissions
permissions:
  contents: read

# Cancel duplicate runs on the same branch/PR
concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────
  # 1. BUILD
  # ────────────────────────────────
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4   # updated from v2

      - name: Set up Python
        uses: actions/setup-python@v5   # updated from v2
        with:
          python-version: '3.8'         # updated from EOL 3.6

      - name: Install dependencies and verify Django config
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py check          # fixed: was [manage.py](http://manage.py)

  # ────────────────────────────────
  # 2. TEST
  # ────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Run Django test suite
        run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py test taskManager   # fixed: was [manage.py](...)

  # ────────────────────────────────
  # 3. SCA — Snyk (Python)
  # ────────────────────────────────
  # What this job does:
  #   - Scans requirements.txt for known CVEs via Snyk's database
  #   - Saves results as snyk-results.json (uploaded as artifact)
  #   - continue-on-error: true means vulnerable deps don't BLOCK
  #     the pipeline yet — results are advisory at this PoC stage
  #
  # Prerequisites:
  #   Go to your repo → Settings → Secrets and variables → Actions
  #   → New repository secret → Name: SNYK_TOKEN, Value: <your token>
  #   Get your token at: https://app.snyk.io/account
  # ────────────────────────────────
  oast-snyk:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      security-events: write   # needed if you later add SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        # Note: @master is the only tag Snyk publishes for the setup action.
        # Acceptable for a PoC — for production, pin to a specific commit SHA.

      # REMOVED: actions/setup-go — not needed for Python SCA
      # REMOVED: actions/setup-node + npm install — django.nv has no package.json
      #          Snyk scans Python via requirements.txt, not npm

      - name: Run Snyk SCA scan
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --json \
            > snyk-results.json || true
          # '|| true' prevents non-zero exit from stopping the upload step.
          # This is equivalent to continue-on-error but more explicit
          # about why we're swallowing the exit code here.
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          # If SNYK_TOKEN is missing from repo secrets, this job will
          # authenticate as anonymous and may return no results or 401.

      - name: Upload Snyk results artifact
        uses: actions/upload-artifact@v4   # updated from v4 (already correct, keeping)
        if: always()
        # 'if: always()' explained:
        #   Snyk exits with code 1 when vulnerabilities are found.
        #   Without 'if: always()', the upload step would be SKIPPED
        #   when vulnerabilities exist — defeating the purpose of the scan.
        #   This ensures the JSON report is always saved regardless of findings.
        with:
          name: snyk-results
          path: snyk-results.json
          retention-days: 14   # added: explicit retention to control storage usage
    
  sast-semgrep:
    runs-on: ubuntu-22.04
    needs: test                  # runs in parallel with Snyk
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Perform Semgrep Analysis
        run: semgrep scan -q --sarif --config "p/django" --config "p/python" --output semgrep.sarif 
        continue-on-error: true
        # Add this only if you have a Semgrep Cloud account:
        # env:
        #   SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep results artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 14

  sast-codeql:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2             # CodeQL needs git history

      # Step 1 — Initialise CodeQL database
      # CodeQL compiles your code into a queryable
      # semantic database before scanning
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-extended → 50% more rules than default
          # security-and-quality → adds maintainability checks
          queries: security-extended,security-and-quality

      # Step 2 — Build the code model
      # For Python this is automatic
      # For Java/C++ this compiles the source
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Step 3 — Run all queries against the database
      # Automatically uploads SARIF to Security tab
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          upload: true
          output: codeql-results

      - name: Upload CodeQL artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: codeql-results
          path: codeql-results/
          retention-days: 14
          
  secret-scanning:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0               # full git history scan
      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif
          retention-days: 14
          
  compliance-checkov:
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4.2.2
      - name: Run Checkov compliance scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: sarif
          output_file_path: .
          soft_fail: true
        continue-on-error: true
        
      - name: Verify Checkov output
        if: always()
        run: |
          echo "=== Files in current directory ==="
          ls -la *.sarif 2>/dev/null || echo "No SARIF files found"
          echo "=== All SARIF files in workspace ==="
          find . -name "*.sarif" 2>/dev/null
          echo "=== Checkov output files ==="
          find . -name "results_sarif.sarif" 2>/dev/null
          find . -name "checkov.sarif" 2>/dev/null

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: results_sarif.sarif 
          category: checkov

      - name: Upload Checkov artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: checkov-results
          path: results_sarif.sarif 
          retention-days: 14
          
  quality-gate:
    runs-on: ubuntu-22.04
    needs: [oast-snyk, sast-semgrep,sast-codeql, secret-scanning,compliance-checkov]
    permissions:
      contents: read
      security-events: read
    if: always()

    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scan-results

      - name: Evaluate quality gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      # for CodeQL API query
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 << 'EOF'
          import json, os, sys

          RESULTS_DIR = "scan-results"
          failures = []
          warnings = []

          print("=" * 60)
          print("QUALITY GATE EVALUATION")
          print("=" * 60)

          # ──────────────────────────────
          # GATE 1: Snyk SCA
          # ──────────────────────────────
          snyk_file = f"{RESULTS_DIR}/snyk-results/snyk-results.json"
          if os.path.exists(snyk_file):
              with open(snyk_file) as f:
                  data = json.load(f)
              vulns = data.get("vulnerabilities", [])
              critical = [v for v in vulns if v.get("severity") == "critical"]
              high     = [v for v in vulns if v.get("severity") == "high"]
              medium   = [v for v in vulns if v.get("severity") == "medium"]

              print(f"\n[SCA - Snyk]")
              print(f"  Critical : {len(critical)}")
              print(f"  High     : {len(high)}")
              print(f"  Medium   : {len(medium)}")

              if len(critical) > 0:
                  failures.append(f"SCA: {len(critical)} CRITICAL vulnerabilities found (threshold: 0)")
              if len(high) > 25:
                  warnings.append(f"SCA: {len(high)} HIGH vulnerabilities found (threshold: 5)")
          else:
              warnings.append("SCA: snyk-results.json not found — scan may have failed")

      
          # ──────────────────────────────
          # GATE 2a: Semgrep SAST
          # ──────────────────────────────
          semgrep_file = f"{RESULTS_DIR}/semgrep-results/semgrep.sarif"
          if os.path.exists(semgrep_file):
              with open(semgrep_file) as f:
                  sarif = json.load(f)
              results = []
              for run in sarif.get("runs", []):
                  results.extend(run.get("results", []))

              semgrep_error   = [r for r in results if r.get("level") == "error"]
              semgrep_warning = [r for r in results if r.get("level") == "warning"]
              semgrep_note    = [r for r in results if r.get("level") == "note"]

              print(f"\n[SAST - Semgrep]")
              print(f"  Error   (High)   : {len(semgrep_error)}")
              print(f"  Warning (Medium) : {len(semgrep_warning)}")
              print(f"  Note    (Low)    : {len(semgrep_note)}")

              if len(semgrep_error) > 0:
                  failures.append(
                      f"SAST Semgrep: {len(semgrep_error)} HIGH/ERROR findings "
                      f"(threshold: 0)"
                  )
              if len(semgrep_warning) > 10:
                  warnings.append(
                      f"SAST Semgrep: {len(semgrep_warning)} MEDIUM findings "
                      f"(threshold: 10)"
                  )
          else:
              warnings.append("SAST Semgrep: semgrep.sarif not found")

          # ──────────────────────────────
          # GATE 2b: CodeQL SAST
          # CodeQL uploads directly to Security tab
          # We query the GitHub API to read results
          # ──────────────────────────────
          print(f"\n[SAST - CodeQL]")
          import urllib.request, urllib.error

          try:
              token = os.environ.get("GITHUB_TOKEN", "")
              repo  = os.environ.get("GITHUB_REPOSITORY", "")
              ref   = os.environ.get("GITHUB_SHA", "")

              if token and repo:
                  url = f"https://api.github.com/repos/{repo}/code-scanning/alerts?state=open&per_page=100"
                  req = urllib.request.Request(url)
                  req.add_header("Authorization", f"token {token}")
                  req.add_header("Accept", "application/vnd.github.v3+json")

                  with urllib.request.urlopen(req) as response:
                      alerts = json.loads(response.read())

                  # Filter CodeQL alerts only
                  codeql_alerts = [
                      a for a in alerts
                      if a.get("tool", {}).get("name", "").lower() == "codeql"
                  ]
                  codeql_critical = [
                      a for a in codeql_alerts
                      if a.get("rule", {}).get("severity", "").lower() == "critical"
                  ]
                  codeql_high = [
                      a for a in codeql_alerts
                      if a.get("rule", {}).get("severity", "").lower() == "high"
                  ]
                  codeql_medium = [
                      a for a in codeql_alerts
                      if a.get("rule", {}).get("severity", "").lower() == "medium"
                  ]

                  print(f"  Critical : {len(codeql_critical)}")
                  print(f"  High     : {len(codeql_high)}")
                  print(f"  Medium   : {len(codeql_medium)}")

                  if len(codeql_critical) > 0:
                      failures.append(
                          f"SAST CodeQL: {len(codeql_critical)} CRITICAL findings "
                          f"(threshold: 0)"
                      )
                  if len(codeql_high) > 0:
                      failures.append(
                          f"SAST CodeQL: {len(codeql_high)} HIGH findings "
                          f"(threshold: 0)"
                      )
              else:
                  warnings.append("SAST CodeQL: GITHUB_TOKEN not available for API query")

          except Exception as e:
              warnings.append(f"SAST CodeQL: could not query API — {str(e)}")

          # ──────────────────────────────
          # GATE 3: Gitleaks Secrets
          # Zero tolerance — any secret = block
          # ──────────────────────────────
          secrets_file = f"{RESULTS_DIR}/gitleaks-results/results.sarif"
          if os.path.exists(secrets_file):
              with open(secrets_file) as f:
                  sarif = json.load(f)

              secrets_found = []
              for run in sarif.get("runs", []):
                  secrets_found.extend(run.get("results", []))

              print(f"\n[Secrets - Gitleaks]")
              print(f"  Secrets found: {len(secrets_found)}")

              if len(secrets_found) > 0:
                  failures.append(f"SECRETS: {len(secrets_found)} secret(s) detected — zero tolerance policy")
          else:
              warnings.append("Secrets: results.sarif not found — scan may have failed")
          # ──────────────────────────────
          # GATE 5: Checkov Compliance
          # ──────────────────────────────
          checkov_file = None
          possible_paths = [
              f"{RESULTS_DIR}/checkov-results/results_sarif.sarif",
              f"{RESULTS_DIR}/checkov-results/checkov.sarif",
          ]
          for path in possible_paths:
              if os.path.exists(path):
                  checkov_file = path
                  break

          print(f"\n[Compliance - Checkov]")
          if checkov_file:
              with open(checkov_file) as f:
                  sarif = json.load(f)

              checkov_results = []
              for run in sarif.get("runs", []):
                  checkov_results.extend(run.get("results", []))

              checkov_error   = [r for r in checkov_results if r.get("level") == "error"]
              checkov_warning = [r for r in checkov_results if r.get("level") == "warning"]

              print(f"  Critical/Error  : {len(checkov_error)}")
              print(f"  High/Warning    : {len(checkov_warning)}")

              if len(checkov_error) > 0:
                  failures.append(
                      f"COMPLIANCE: {len(checkov_error)} CRITICAL misconfigurations "
                      f"(threshold: 0)"
                  )
              if len(checkov_warning) > 5:
                  warnings.append(
                      f"COMPLIANCE: {len(checkov_warning)} HIGH misconfigs "
                      f"(threshold: 5)"
                  )
          else:
              warnings.append(
                  "Compliance: no Checkov SARIF found — "
                  "checked results_sarif.sarif and checkov.sarif"
              )

          # ──────────────────────────────
          # FINAL VERDICT
          # ──────────────────────────────
          print("\n" + "=" * 60)
          print("GATE SUMMARY")
          print("=" * 60)

          if warnings:
              print("\nWARNINGS:")
              for w in warnings:
                  print(f"  ⚠  {w}")

          if failures:
              print("\nBLOCKERS:")
              for f in failures:
                  print(f"  ✖  {f}")
              print("\n" + "=" * 60)
              print("QUALITY GATE: FAILED — merge is blocked")
              print("=" * 60)
              sys.exit(1)
          else:
              print("\n" + "=" * 60)
              print("QUALITY GATE: PASSED — pipeline may proceed")
              print("=" * 60)
              sys.exit(0)

          EOF      
  # ────────────────────────────────
  # 4. INTEGRATION (stub)
  # ────────────────────────────────
  integration:
    runs-on: ubuntu-22.04
    needs: quality-gate
    steps:
      - name: Integration smoke test
        run: echo "Integration step — replace with real smoke test"
      # REMOVED: 'run: exit 1' with continue-on-error
      # Reason: intentional failures train developers to ignore
      # yellow/red pipeline status. Remove or replace with a real test.

  # ────────────────────────────────
  # 5. PROD DEPLOY (stub)
  # ────────────────────────────────
  prod:
    runs-on: ubuntu-22.04
    needs: integration
    steps:
      - name: Deploy to production
        run: echo "Deploy step — replace with actual deploy command"
